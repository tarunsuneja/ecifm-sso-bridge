server:
  forward-headers-strategy: framework

spring:
  security:
    oauth2:
      authorizationserver:
        issuer: ${BRIDGE_ISSUER_URL}
      client:
        registration:
          entra-id:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          entra-id:
            issuer-uri: ${JWT_ISSUER_URI}
            user-name-attribute: sub
bridge:
  issuer-url: ${BRIDGE_ISSUER_URL}

mas:
  base-url: ${MAS_BASE_URL}
  context: ${MAS_CONTEXT:/tririga}
  redirect-url: ${MAS_REDIRECT_URL:https://main.facilities.inst1.apps.npos2.ecifmdev.net/app/tririga}
  rest-api: ${MAS_REST_API:/html/en/default/rest/SSOConnect?userName={0}&adGroupName={1}}
  oidc:
    client-id: ${MAS_OIDC_CLIENT_ID:mas-facilities}
    client-secret: ${MAS_OIDC_CLIENT_SECRET}
    token-uri: ${MAS_OIDC_TOKEN_URI:}
    redirect-uri: ${MAS_OIDC_REDIRECT_URI:https://main.facilities.inst1.apps.npos2.ecifmdev.net/oidcclient/redirect/facilities}
  oauth:
    client-redirect-uri: ${MAS_OAUTH_CLIENT_REDIRECT_URI:}

tririga:
  username: ${TRIRIGA_USERNAME}
  password: ${TRIRIGA_PASSWORD}
  named-query:
    project-name: ${MAS_NAMED_QUERY_PROJECT:}
    module-name: ${MAS_NAMED_QUERY_MODULE:}
    object-type-name: ${MAS_NAMED_QUERY_OBJECT_TYPE:}
    query-name: ${MAS_NAMED_QUERY_NAME:}
    filter-field: ${MAS_NAMED_QUERY_FILTER_FIELD:}
    group-column-name: ${MAS_NAMED_QUERY_GROUP_COLUMN:Group Name}
    filter-operator: ${MAS_NAMED_QUERY_FILTER_OPERATOR:10}
    filter-data-type: ${MAS_NAMED_QUERY_FILTER_DATA_TYPE:320}
  people:
    section-name: ${MAS_PEOPLE_SECTION:RecordInformation}
    group-field-name: ${MAS_PEOPLE_GROUP_FIELD:}
    current-group-field-name: ${MAS_PEOPLE_CURRENT_GROUP_FIELD:cstCurrentADGroupTX}
    previous-group-field-name: ${MAS_PEOPLE_PREV_GROUP_FIELD:cstPreviousADGroupTX}
    group-field-action: ${MAS_PEOPLE_GROUP_ACTION:triRevise}
    status-column-name: ${MAS_PEOPLE_STATUS_COLUMN:Status}
    active-status-value: ${MAS_PEOPLE_ACTIVE_STATUS:Active User}
    poll-max-retries: ${MAS_PEOPLE_POLL_RETRIES:6}
    poll-delay-ms: ${MAS_PEOPLE_POLL_DELAY:5000}

entra-id:
  graph:
    enabled: ${GRAPH_API_ENABLED:true}
    api-version: v1.0

logging:
  level:
    com.ecifm.saml.bridge: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
    org.springframework.security.oauth2.client: TRACE
