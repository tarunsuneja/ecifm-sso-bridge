# ─────────────────────────────────────────────────────────────────
# STAGE 4: OpenShift & Kubernetes
# Exercise 3: Secret (sensitive data)
# ─────────────────────────────────────────────────────────────────
#
# Secrets hold sensitive data (passwords, tokens, certs).
# Values MUST be base64-encoded.
# In production, use sealed-secrets, external-secrets, or Vault.
#
# Encode a value:
#   echo -n "my-password" | base64
#   → bXktcGFzc3dvcmQ=
#
# Decode a value:
#   echo "bXktcGFzc3dvcmQ=" | base64 -d
#   → my-password
#
# Apply:
#   oc apply -f secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: learning-lab-secret
  labels:
    app: learning-lab
type: Opaque
data:
  # echo -n "s3cret!" | base64
  DB_PASSWORD: czNjcmV0IQ==
  # echo -n "sk-abc123..." | base64
  API_KEY: c2stYWJjMTIzLi4u
